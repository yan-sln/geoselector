# ──────────────────────────────────────────────────────────────
#   Configuration centrale du paquet geoselector
# ──────────────────────────────────────────────────────────────
api:
  base_url: "https://geo.api.gouv.fr"
  timeout:
    search: 5          # seconds
    geometry: 10       # seconds

endpoints:
  municipality: "communes"
  department:   "departements"
  region:       "regions"

fields:
  municipality: "nom,code,codeDepartement"
  department:   "nom,code,codeRegion"
  region:       "nom,code"

logging:
  level: "INFO"                     # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "%(asctime)s %(levelname)s %(name)s – %(message)s"
  file: "geoselector.log"                 # Si vide, alors log sur console uniquement